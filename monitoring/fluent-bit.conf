[SERVICE]
    Flush         1
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[FILTER]
    Name          parser
    Match         *
    Key_Name      log
    Parser        json
    Reserve_Data  Off

# One OUTPUT per Docker-compose fluentd tag. Tags are set by the `logging.options.tag`
# key on each service in docker-compose.dev.yml; keep this list in sync whenever a
# service is added, renamed, or removed.

[OUTPUT]
    Name          loki
    Match         gateway-svc
    Host          loki
    Port          3100
    Labels        job=gateway-svc, container=gateway-svc
    Line_Format   json

