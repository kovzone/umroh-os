# OpenTelemetry collector — production (no Jaeger/Tempo; traces go to debug sink).
# Keeps the same otel-collector:4317 gRPC address as local dev for backend services.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
  batch: {}
exporters:
  debug:
    verbosity: basic
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
