# Prometheus scrape config for local/dev.
#
# Post BL-IAM-019 / S1-E-14 every downstream backend is gRPC-only and pushes
# metrics via OTLP to the otel-collector — their series appear in the
# otel-collector job labeled with service_name="<svc>-svc". The only remaining
# direct-scrape target is gateway-svc, which still exposes Fiber /metrics
# (REST is the edge there).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway-svc
    static_configs:
      - targets: ["gateway-svc:4000"]
    metrics_path: /metrics

  # catalog-svc, iam-svc, finance-svc, and the seven pure-scaffold backends
  # push metrics via OTLP; their series appear here labeled with
  # service_name="<svc>".
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics
