openapi: 3.0.3
info:
  title: gateway-svc API
  version: 0.1.0
  description: |
    Edge REST API for UmrohOS. gateway-svc fronts every backend service and is
    the only outward-facing HTTP surface clients (web app, mobile app, CLI)
    should call.

    Scaffold scope: 12 endpoints —

      - 2 own probes: /system/live, /system/ready
      - 10 per-backend liveness proxies: /v1/<svc>/system/live, one per
        backend in the umrohos service map. Used by the web app's status page.

    Real per-route proxies (auth, packages, bookings, ...) land alongside
    each backend's first feature work.

servers:
  - url: /
    description: Base path

paths:
  /system/live:
    get:
      tags: [System]
      summary: Liveness probe
      description: Verifies the gateway process is alive. No external dependencies.
      operationId: liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }

  /system/ready:
    get:
      tags: [System]
      summary: Readiness probe
      description: |
        Verifies the gateway instance can handle traffic. At scaffold time this is a
        process-local check; later iterations may aggregate per-adapter health.
      operationId: readiness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadyResponse" }

  /v1/iam/system/live:
    get:
      tags: [Proxy / iam]
      summary: Proxy iam-svc liveness
      operationId: getIamSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/iam/system/diagnostics/db-tx:
    get:
      tags: [Proxy / iam]
      summary: Proxy iam-svc DB transaction diagnostic
      description: |
        Traced cross-service verification path. Proxies to iam-svc's
        state-mutating `/system/diagnostics/db-tx` diagnostic, which inserts a
        row into `public.diagnostics` inside a WithTx and echoes the message
        back. Used by the `S0-J-05` observability acceptance check: a single
        request through this endpoint must produce one trace in Tempo whose
        spans span gateway-svc and iam-svc, and matching `trace_id`-tagged log
        lines in Loki for both containers.

        Pilot-scope endpoint; not for health/readiness probes. Gate with auth
        / a header secret before promoting past pilot.
      operationId: getIamSystemDbTxDiagnostic
      parameters:
        - name: message
          in: query
          required: false
          schema:
            type: string
            default: "no message"
          description: Message to store and echo back.
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DbTxDiagnosticResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # /v1/catalog/system/live removed in S1-E-11: catalog-svc is now gRPC-only.
  # /v1/iam/system/live removed in S1-E-12: iam-svc is now gRPC-only.
  # IAM client-facing auth routes below replace the former iam-svc REST surface.

  # ── IAM Auth routes (BL-IAM-018 / S1-E-12) ─────────────────────────────
  # gateway-svc proxies these to iam-svc via iam_grpc_adapter per ADR 0009.
  # Request/response shapes mirror iam-svc's former REST surface exactly so
  # existing clients (web app, mobile) do not need to change.

  /v1/auth/login:
    post:
      tags: [IAM / Auth]
      summary: Login — exchange credentials for an access + refresh token pair
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "400":
          description: Malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Account suspended or pending activation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/auth/refresh:
    post:
      tags: [IAM / Auth]
      summary: Rotate refresh token — issue a new access + refresh pair
      operationId: refreshSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshSessionRequest" }
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshSessionResponse" }
        "400":
          description: Malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Refresh token unknown, expired, or revoked (replay)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/auth/logout:
    delete:
      tags: [IAM / Auth]
      summary: Logout — revoke the current session row
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/me:
    get:
      tags: [IAM / Me]
      summary: Current user profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetMeResponse" }
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/me/2fa/enroll:
    post:
      tags: [IAM / Me]
      summary: Begin TOTP enrollment
      operationId: enrollTOTP
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Enrollment started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollTOTPResponse" }
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: TOTP already verified for this user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/me/2fa/verify:
    post:
      tags: [IAM / Me]
      summary: Verify TOTP code and mark enrollment complete
      operationId: verifyTOTP
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyTOTPRequest" }
      responses:
        "200":
          description: Verification successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyTOTPResponse" }
        "400":
          description: Malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Invalid TOTP code or missing/invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/users/{id}/suspend:
    post:
      tags: [IAM / Admin]
      summary: Suspend a user and revoke every active session
      operationId: suspendUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: Target user UUID.
      responses:
        "200":
          description: User suspended
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuspendUserResponse" }
        "400":
          description: Malformed user id OR self-suspend
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Bearer's user lacks iam.users/suspend/global permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Target user not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Public catalog read (BL-GTW-002 / S1-E-10) ─────────────────────────
  # Gateway REST → catalog-svc gRPC via catalog_grpc_adapter. Responses
  # mirror services/catalog-svc/api/rest_oapi/openapi.yaml § Catalog
  # shape-for-shape so e2e specs passing against either port yield
  # identical bodies. After G7 (BL-REFACTOR-001) the catalog REST port
  # goes away and these gateway routes become the only client-facing
  # surface.
  /v1/packages:
    get:
      tags: [Catalog]
      summary: List active packages
      operationId: listPackages
      security: []
      parameters:
        - name: kind
          in: query
          required: false
          schema: { $ref: "#/components/schemas/PackageKind" }
        - name: airline_code
          in: query
          required: false
          schema: { type: string }
        - name: hotel_id
          in: query
          required: false
          schema: { type: string }
        - name: departure_from
          in: query
          required: false
          schema: { type: string, format: date }
        - name: departure_to
          in: query
          required: false
          schema: { type: string, format: date }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListPackagesResponse" }
        "400":
          description: Bad request (invalid_query_param / invalid_cursor)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "502":
          description: catalog-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/packages/{id}:
    get:
      tags: [Catalog]
      summary: Active package detail
      operationId: getPackageById
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Package ULID, `pkg_`-prefixed.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetPackageResponse" }
        "404":
          description: Package not found or not publicly visible.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "502":
          description: catalog-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/package-departures/{id}:
    get:
      tags: [Catalog]
      summary: Active package-departure detail
      operationId: getPackageDepartureById
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Departure ULID, `dep_`-prefixed.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetDepartureResponse" }
        "404":
          description: Departure not found or not publicly visible.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "502":
          description: catalog-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  # ---------------------------------------------------------------------------
  # Staff catalog write routes (BL-CAT-014 / S1-E-07)
  # All require Bearer token + catalog.package.manage permission.
  # Response shapes are the same read models (PackageDetail, DepartureDetail)
  # so the frontend can reuse its existing display components.
  # ---------------------------------------------------------------------------

  /v1/packages/create:
    # POST /v1/packages is handled inline under /v1/packages above, but since
    # oapi-codegen merges methods on the same path, we declare it here as a
    # separate path alias so it appears in the spec for documentation purposes.
    # The actual route registration is done manually in cmd/server.go.
    post:
      tags: [Catalog-Staff]
      summary: Create a catalog package (draft)
      operationId: createPackage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePackageBody" }
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetPackageResponse" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "403":
          description: Missing catalog.package.manage permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/packages/{id}/update:
    put:
      tags: [Catalog-Staff]
      summary: Update a catalog package (partial)
      operationId: updatePackageById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePackageBody" }
      responses:
        "200":
          description: Package updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetPackageResponse" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "403":
          description: Missing catalog.package.manage permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "404":
          description: Package not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/packages/{id}/delete:
    delete:
      tags: [Catalog-Staff]
      summary: Soft-delete a catalog package (archive)
      operationId: deletePackageById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Package archived
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "403":
          description: Missing catalog.package.manage permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "404":
          description: Package not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/packages/{id}/departures/create:
    post:
      tags: [Catalog-Staff]
      summary: Create a departure under a package
      operationId: createDeparture
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Package ULID
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDepartureBody" }
      responses:
        "201":
          description: Departure created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetDepartureResponse" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "403":
          description: Missing catalog.package.manage permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "404":
          description: Package not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/departures/{id}:
    put:
      tags: [Catalog-Staff]
      summary: Update a departure (partial)
      operationId: updateDepartureById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Departure ULID
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDepartureBody" }
      responses:
        "200":
          description: Departure updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetDepartureResponse" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "403":
          description: Missing catalog.package.manage permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "404":
          description: Departure not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/booking/system/live:
    get:
      tags: [Proxy / booking]
      summary: Proxy booking-svc liveness
      operationId: getBookingSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/jamaah/system/live:
    get:
      tags: [Proxy / jamaah]
      summary: Proxy jamaah-svc liveness
      operationId: getJamaahSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/payment/system/live:
    get:
      tags: [Proxy / payment]
      summary: Proxy payment-svc liveness
      operationId: getPaymentSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/visa/system/live:
    get:
      tags: [Proxy / visa]
      summary: Proxy visa-svc liveness
      operationId: getVisaSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/ops/system/live:
    get:
      tags: [Proxy / ops]
      summary: Proxy ops-svc liveness
      operationId: getOpsSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/logistics/system/live:
    get:
      tags: [Proxy / logistics]
      summary: Proxy logistics-svc liveness
      operationId: getLogisticsSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/finance/system/live:
    get:
      tags: [Proxy / finance]
      summary: Proxy finance-svc liveness
      operationId: getFinanceSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/crm/system/live:
    get:
      tags: [Proxy / crm]
      summary: Proxy crm-svc liveness
      operationId: getCrmSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PASETO
      description: |
        Single-point edge authentication per ADR 0009 / F1-W7. Clients send
        `Authorization: Bearer <access_token>` on any protected route.
        gateway-svc validates the token once against `iam-svc.ValidateToken`
        (gRPC); backends do NOT re-validate. Failure modes: missing/malformed
        → 401 UNAUTHORIZED; iam-svc rejects → 401 UNAUTHORIZED; iam-svc
        unreachable → 502 SERVICE_UNAVAILABLE (fail-closed).

        No route is currently tagged with this scheme — first consumer lands
        with BL-IAM-018 / S1-E-12 when iam auth REST routes move to gateway.

  schemas:
    LiveResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean, example: true }

    ReadyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean, example: true }

    DbTxDiagnosticResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [diagnostic_id, message]
          properties:
            diagnostic_id:
              type: integer
              format: int64
              description: ID of the row inserted by iam-svc.
            message:
              type: string
              description: Echo of the message received from the client.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:    { type: string, example: BAD_GATEWAY }
            message: { type: string, example: upstream service unavailable }

    # ── Catalog error envelope (BL-GTW-002 / S1-E-10) ──────────────────
    # Mirror of services/catalog-svc/api/rest_oapi/openapi.yaml
    # ErrorResponse: snake_case code, id-ID message, optional trace_id.
    # Catalog handlers on gateway write this directly (bypassing the
    # default gateway error middleware that emits UPPER_SNAKE codes).
    CatalogErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                snake_case catalog error code (e.g. `package_not_found`,
                `departure_not_found`, `invalid_query_param`,
                `invalid_cursor`, `internal_error`, `service_unavailable`).
              example: package_not_found
            message:
              type: string
              description: Human-readable message in Bahasa Indonesia (Q003).
              example: paket tidak ditemukan
            trace_id:
              type: string
              description: OTel span ID (hex) for correlation with Tempo.

    # ── Catalog: money / enum helpers ──────────────────────────────────
    Money:
      type: object
      required: [list_amount, list_currency, settlement_currency]
      properties:
        list_amount:
          type: integer
          format: int64
          example: 38500000
        list_currency:
          type: string
          example: IDR
        settlement_currency:
          type: string
          enum: [IDR]
          example: IDR

    PackageKind:
      type: string
      enum: [umrah_reguler, umrah_plus, hajj_furoda, hajj_khusus, badal, financial, retail]

    RoomType:
      type: string
      enum: [double, triple, quad]

    DepartureStatus:
      type: string
      enum: [open, closed]

    OperatorKind:
      type: string
      enum: [airline, rail, bus]

    VendorReadinessState:
      type: string
      enum: [not_started, in_progress, ready, blocked]

    # ── Catalog: master-data refs ──────────────────────────────────────
    HotelRef:
      type: object
      required: [id, name, city, star_rating, walking_distance_m]
      properties:
        id: { type: string }
        name: { type: string }
        city: { type: string }
        star_rating: { type: integer, minimum: 0, maximum: 5 }
        walking_distance_m: { type: integer, minimum: 0 }

    AirlineRef:
      type: object
      required: [id, code, name, operator_kind]
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        operator_kind: { $ref: "#/components/schemas/OperatorKind" }

    MuthawwifRef:
      type: object
      required: [id, name, portrait_url]
      properties:
        id: { type: string }
        name: { type: string }
        portrait_url: { type: string }

    AddonRef:
      type: object
      required: [id, name, list_amount, list_currency, settlement_currency]
      properties:
        id: { type: string }
        name: { type: string }
        list_amount: { type: integer, format: int64 }
        list_currency: { type: string, example: IDR }
        settlement_currency: { type: string, enum: [IDR], example: IDR }

    ItineraryDay:
      type: object
      required: [day, title, description]
      properties:
        day: { type: integer, minimum: 1 }
        title: { type: string }
        description: { type: string }
        photo_url: { type: string }

    Itinerary:
      type: object
      required: [id, days, public_url]
      properties:
        id: { type: string }
        days:
          type: array
          items: { $ref: "#/components/schemas/ItineraryDay" }
        public_url: { type: string }

    # ── Catalog: departure-detail shapes ───────────────────────────────
    PackagePricing:
      type: object
      required: [room_type, list_amount, list_currency, settlement_currency]
      properties:
        room_type: { $ref: "#/components/schemas/RoomType" }
        list_amount: { type: integer, format: int64 }
        list_currency: { type: string, example: IDR }
        settlement_currency: { type: string, enum: [IDR], example: IDR }

    VendorReadiness:
      type: object
      required: [ticket, hotel, visa]
      properties:
        ticket: { $ref: "#/components/schemas/VendorReadinessState" }
        hotel: { $ref: "#/components/schemas/VendorReadinessState" }
        visa: { $ref: "#/components/schemas/VendorReadinessState" }

    DepartureDetail:
      type: object
      required:
        - id
        - package_id
        - departure_date
        - return_date
        - total_seats
        - remaining_seats
        - status
        - pricing
        - vendor_readiness
      properties:
        id: { type: string }
        package_id: { type: string }
        departure_date: { type: string, format: date }
        return_date: { type: string, format: date }
        total_seats: { type: integer, minimum: 0 }
        remaining_seats: { type: integer, minimum: 0 }
        status: { $ref: "#/components/schemas/DepartureStatus" }
        pricing:
          type: array
          items: { $ref: "#/components/schemas/PackagePricing" }
        vendor_readiness: { $ref: "#/components/schemas/VendorReadiness" }

    GetDepartureResponse:
      type: object
      required: [departure]
      properties:
        departure: { $ref: "#/components/schemas/DepartureDetail" }

    # ── Catalog: package-specific ──────────────────────────────────────
    NextDeparture:
      type: object
      required: [id, departure_date, return_date, remaining_seats]
      properties:
        id: { type: string }
        departure_date: { type: string, format: date }
        return_date: { type: string, format: date }
        remaining_seats: { type: integer, minimum: 0 }

    DepartureSummary:
      type: object
      required: [id, departure_date, return_date, remaining_seats, status]
      properties:
        id: { type: string }
        departure_date: { type: string, format: date }
        return_date: { type: string, format: date }
        remaining_seats: { type: integer, minimum: 0 }
        status: { $ref: "#/components/schemas/DepartureStatus" }

    PackageListItem:
      type: object
      required: [id, kind, name, description, cover_photo_url, starting_price]
      properties:
        id: { type: string }
        kind: { $ref: "#/components/schemas/PackageKind" }
        name: { type: string }
        description: { type: string }
        cover_photo_url: { type: string }
        starting_price: { $ref: "#/components/schemas/Money" }
        next_departure:
          allOf:
            - $ref: "#/components/schemas/NextDeparture"
          nullable: true

    PackageDetail:
      type: object
      required:
        - id
        - kind
        - name
        - description
        - highlights
        - cover_photo_url
        - hotels
        - add_ons
        - departures
      properties:
        id: { type: string }
        kind: { $ref: "#/components/schemas/PackageKind" }
        name: { type: string }
        description: { type: string }
        highlights:
          type: array
          items: { type: string }
        cover_photo_url: { type: string }
        itinerary:
          allOf:
            - $ref: "#/components/schemas/Itinerary"
          nullable: true
        hotels:
          type: array
          items: { $ref: "#/components/schemas/HotelRef" }
        airline:
          allOf:
            - $ref: "#/components/schemas/AirlineRef"
          nullable: true
        muthawwif:
          allOf:
            - $ref: "#/components/schemas/MuthawwifRef"
          nullable: true
        add_ons:
          type: array
          items: { $ref: "#/components/schemas/AddonRef" }
        departures:
          type: array
          items: { $ref: "#/components/schemas/DepartureSummary" }

    PageMeta:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: string
          nullable: true
        has_more: { type: boolean }

    ListPackagesResponse:
      type: object
      required: [packages, page]
      properties:
        packages:
          type: array
          items: { $ref: "#/components/schemas/PackageListItem" }
        page: { $ref: "#/components/schemas/PageMeta" }

    GetPackageResponse:
      type: object
      required: [package]
      properties:
        package: { $ref: "#/components/schemas/PackageDetail" }

    # ── IAM auth schemas (BL-IAM-018 / S1-E-12) ─────────────────────────
    # All auth routes proxied from iam-svc REST → gateway REST → iam-svc gRPC.

    UserProfile:
      type: object
      required: [user_id, email, name, branch_id, status]
      properties:
        user_id:    { type: string, format: uuid }
        email:      { type: string, format: email }
        name:       { type: string }
        branch_id:  { type: string, format: uuid }
        status:
          type: string
          enum: [active, suspended, pending]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:     { type: string, format: email }
        password:  { type: string }
        totp_code: { type: string, description: "6-digit TOTP code; required only when TOTP is enrolled and verified." }

    LoginResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [access_token, refresh_token, access_expires_at, refresh_expires_at, user]
          properties:
            access_token:       { type: string }
            refresh_token:      { type: string }
            access_expires_at:  { type: string, format: date-time }
            refresh_expires_at: { type: string, format: date-time }
            user: { $ref: "#/components/schemas/UserProfile" }

    RefreshSessionRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    RefreshSessionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [access_token, refresh_token, access_expires_at, refresh_expires_at]
          properties:
            access_token:       { type: string }
            refresh_token:      { type: string }
            access_expires_at:  { type: string, format: date-time }
            refresh_expires_at: { type: string, format: date-time }

    GetMeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, totp_enrolled, totp_verified]
          properties:
            user: { $ref: "#/components/schemas/UserProfile" }
            totp_enrolled: { type: boolean }
            totp_verified: { type: boolean }

    EnrollTOTPResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [secret, otpauth_url]
          properties:
            secret:      { type: string, description: "Base32 TOTP secret — display to user once." }
            otpauth_url: { type: string, description: "otpauth:// URI for QR-code generation." }

    VerifyTOTPRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, description: "6-digit TOTP code from the authenticator app." }

    VerifyTOTPResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [verified_at]
          properties:
            verified_at: { type: string, format: date-time }

    SuspendUserResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user]
          properties:
            user: { $ref: "#/components/schemas/UserProfile" }

    # ---------------------------------------------------------------------------
    # Staff catalog write schemas (BL-CAT-014 / S1-E-07)
    # ---------------------------------------------------------------------------

    PricingInputBody:
      type: object
      required: [room_type, list_amount, list_currency, settlement_currency]
      properties:
        room_type:           { type: string, enum: [double, triple, quad] }
        list_amount:         { type: integer, format: int64, minimum: 1 }
        list_currency:       { type: string, enum: [IDR, USD] }
        settlement_currency: { type: string, enum: [IDR], default: IDR }

    CreatePackageBody:
      type: object
      required: [kind, name]
      properties:
        kind:            { $ref: "#/components/schemas/PackageKind" }
        name:            { type: string, maxLength: 200 }
        description:     { type: string }
        cover_photo_url: { type: string }
        highlights:      { type: array, items: { type: string } }
        itinerary_id:    { type: string }
        airline_id:      { type: string }
        muthawwif_id:    { type: string }
        hotel_ids:       { type: array, items: { type: string } }
        addon_ids:       { type: array, items: { type: string } }
        status:          { type: string, enum: [draft, active], default: draft }

    UpdatePackageBody:
      type: object
      properties:
        name:            { type: string, maxLength: 200 }
        description:     { type: string }
        cover_photo_url: { type: string }
        highlights:      { type: array, items: { type: string } }
        itinerary_id:    { type: string }
        airline_id:      { type: string }
        muthawwif_id:    { type: string }
        hotel_ids:       { type: array, items: { type: string } }
        addon_ids:       { type: array, items: { type: string } }
        status:          { type: string, enum: [draft, active, archived] }

    CreateDepartureBody:
      type: object
      required: [departure_date, return_date, total_seats]
      properties:
        departure_date: { type: string, format: date, description: "ISO YYYY-MM-DD" }
        return_date:    { type: string, format: date, description: "ISO YYYY-MM-DD" }
        total_seats:    { type: integer, minimum: 1 }
        status:         { type: string, enum: [open, closed], default: open }
        pricing:        { type: array, items: { $ref: "#/components/schemas/PricingInputBody" } }

    UpdateDepartureBody:
      type: object
      properties:
        departure_date: { type: string, format: date }
        return_date:    { type: string, format: date }
        total_seats:    { type: integer, minimum: 0, description: "0 = leave unchanged" }
        status:         { type: string, enum: [open, closed, cancelled] }
        pricing:        { type: array, items: { $ref: "#/components/schemas/PricingInputBody" } }
