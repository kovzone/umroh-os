openapi: 3.0.3
info:
  title: gateway-svc API
  version: 0.1.0
  description: |
    Edge REST API for UmrohOS. gateway-svc fronts every backend service and is
    the only outward-facing HTTP surface clients (web app, mobile app, CLI)
    should call.

    Scaffold scope: 12 endpoints —

      - 2 own probes: /system/live, /system/ready
      - 10 per-backend liveness proxies: /v1/<svc>/system/live, one per
        backend in the umrohos service map. Used by the web app's status page.

    Real per-route proxies (auth, packages, bookings, ...) land alongside
    each backend's first feature work.

servers:
  - url: /
    description: Base path

paths:
  /system/live:
    get:
      tags: [System]
      summary: Liveness probe
      description: Verifies the gateway process is alive. No external dependencies.
      operationId: liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }

  /system/ready:
    get:
      tags: [System]
      summary: Readiness probe
      description: |
        Verifies the gateway instance can handle traffic. At scaffold time this is a
        process-local check; later iterations may aggregate per-adapter health.
      operationId: readiness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadyResponse" }

  /v1/iam/system/live:
    get:
      tags: [Proxy / iam]
      summary: Proxy iam-svc liveness
      operationId: getIamSystemLive
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/iam/system/diagnostics/db-tx:
    get:
      tags: [Proxy / iam]
      summary: Proxy iam-svc DB transaction diagnostic
      description: |
        Traced cross-service verification path. Proxies to iam-svc's
        state-mutating `/system/diagnostics/db-tx` diagnostic, which inserts a
        row into `public.diagnostics` inside a WithTx and echoes the message
        back. Used by the `S0-J-05` observability acceptance check: a single
        request through this endpoint must produce one trace in Tempo whose
        spans span gateway-svc and iam-svc, and matching `trace_id`-tagged log
        lines in Loki for both containers.

        Pilot-scope endpoint; not for health/readiness probes. Gate with auth
        / a header secret before promoting past pilot.
      operationId: getIamSystemDbTxDiagnostic
      parameters:
        - name: message
          in: query
          required: false
          schema:
            type: string
            default: "no message"
          description: Message to store and echo back.
      responses:
        "200":
          description: Upstream OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DbTxDiagnosticResponse" }
        "502":
          description: Upstream call failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/catalog/system/live:
    get:
      tags: [Proxy / catalog]
      summary: Proxy catalog-svc liveness
      operationId: getCatalogSystemLive
      responses:
        "200":
          description: Upstream OK
