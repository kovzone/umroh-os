openapi: 3.0.3
info:
  title: gateway-svc API
  version: 0.1.0
  description: |
    Edge REST API for UmrohOS. gateway-svc fronts every backend service and is
    the only outward-facing HTTP surface clients (web app, mobile app, CLI)
    should call.

    Current surface:

      - 2 own probes: /system/live, /system/ready. No per-backend REST
        liveness proxies — every backend is gRPC-only (BL-REFACTOR-001..008 /
        BL-IAM-018..019). Operators probe backends via grpc_health_probe
        against each service's standard grpc.health.v1.Health endpoint.
      - Public catalog reads: /v1/packages, /v1/packages/{id},
        /v1/package-departures/{id} (BL-GTW-002 / S1-E-10).
      - Client-facing auth (BL-IAM-018 / S1-E-12): /v1/sessions (login +
        refresh + logout), /v1/me (profile + TOTP enroll/verify),
        /v1/users/{id}/suspend (admin). Protected routes carry the
        `bearerAuth` security scheme; the gateway enforces it once at the edge
        via `iam-svc.ValidateToken` (gRPC).
      - Permission-gate smoke (BL-IAM-019 / S1-E-14): /v1/finance/ping —
        bearer + `journal_entry/read/global` permission required, enforced
        by gateway's RequireBearerToken + RequirePermission middleware
        chain. finance-svc is identity-agnostic; gateway assembles the
        client-visible envelope from its own auth locals.

    Real per-route proxies (bookings, payments, ...) land alongside each
    backend's first feature work.

servers:
  - url: /
    description: Base path

paths:
  /system/live:
    get:
      tags: [System]
      summary: Liveness probe
      description: Verifies the gateway process is alive. No external dependencies.
      operationId: liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveResponse" }

  /system/ready:
    get:
      tags: [System]
      summary: Readiness probe
      description: |
        Verifies the gateway instance can handle traffic. At scaffold time this is a
        process-local check; later iterations may aggregate per-adapter health.
      operationId: readiness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadyResponse" }

  /v1/system/backends:
    get:
      tags: [System]
      summary: Aggregate per-backend health via grpc.health.v1.Health.Check
      description: |
        Fans out `grpc.health.v1.Health.Check` to every downstream backend and
        returns a sorted array of `{name, status, error?}` entries. The Svelte
        core-web status page polls this route instead of per-backend
        `/v1/<svc>/system/live` proxies (retired with the ADR 0009 sweep).
        Unauthenticated — the status page is reachable pre-login.
        Per-backend probe timeout is 2 s; probes run concurrently so the
        response wall-time is bounded regardless of how many backends are
        wired. A healthy probe returns `SERVING`; a reachable-but-draining
        backend returns `NOT_SERVING`; any transport failure surfaces as
        `UNKNOWN` with a non-empty `error` field.
      operationId: getSystemBackends
      security: []
      responses:
        "200":
          description: Aggregate status map (one entry per dialed backend).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemBackendsResponse" }

  # ── Client-facing auth (BL-IAM-018 / S1-E-12) ──────────────────────────
  # gateway REST → iam-svc gRPC via iam_grpc_adapter. iam-svc's own REST
  # port was retired in this card; these gateway routes are the sole
  # client-facing auth surface. Protected routes carry `security:
  # [bearerAuth]`; gateway mounts `RequireBearerToken()` middleware per
  # protected route in cmd/server.go. Unauthenticated transport failures
  # (iam-svc unreachable) emit SERVICE_UNAVAILABLE (502), fail-closed.

  /v1/sessions:
    post:
      tags: [Sessions]
      summary: Login — exchange credentials for an access + refresh pair
      description: |
        Authenticates a staff user by email + password and returns a PASETO
        access token plus an opaque refresh token. Public endpoint (no bearer).
        TOTP enforcement at login is deferred to S1-E-06; `totp_code` is
        accepted but ignored today.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "400":
          description: Malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Account suspended or pending activation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc unreachable (fail-closed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    delete:
      tags: [Sessions]
      summary: Logout — revoke the current session row
      description: |
        Revokes the refresh-token row identified by the session-id claim baked
        into the bearer access token. Idempotent — a second call on an
        already-revoked session still returns 204.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/sessions/refresh:
    post:
      tags: [Sessions]
      summary: Rotate refresh token — issue a new access + refresh pair
      description: |
        Validates the supplied refresh token, rotates it (revokes the old row,
        creates a new row) and returns a new pair. Refresh-token replay
        (presenting a token already seen as revoked) triggers revocation of
        every active session for the user.
      operationId: refreshSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshSessionRequest" }
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshSessionResponse" }
        "400":
          description: Malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Refresh token unknown, expired, or revoked (replay)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: User no longer active
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/me:
    get:
      tags: [Me]
      summary: Current user profile
      description: Returns the user profile resolved from the bearer access token.
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetMeResponse" }
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: User not found (soft-deleted after token issuance)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/me/2fa/enroll:
    post:
      tags: [Me]
      summary: Begin TOTP enrollment — generate a secret + otpauth URL
      description: |
        Generates a fresh TOTP secret, persists it encrypted at rest on the
        current user's row, and returns the plaintext base32 secret plus the
        `otpauth://` URL the client renders as a QR code. Returned exactly once.
      operationId: enrollTotp
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Enrollment started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollTotpResponse" }
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: TOTP already verified for this user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/me/2fa/verify:
    post:
      tags: [Me]
      summary: Verify TOTP code and mark enrollment complete
      description: |
        Accepts a six-digit code from the authenticator app and, on success,
        stamps `users.totp_verified_at` with now().
      operationId: verifyTotp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyTotpRequest" }
      responses:
        "200":
          description: Verification successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyTotpResponse" }
        "400":
          description: Malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Invalid TOTP code or missing/invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: TOTP not yet enrolled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/users/{id}/suspend:
    post:
      tags: [Admin]
      summary: Suspend a user and revoke every active session
      description: |
        Flips `iam.users.status` for the target from `active` to `suspended`
        and revokes every non-revoked row in `iam.sessions` for that user
        inside one transaction. Requires the bearer's user to hold the
        `iam.users/suspend/global` permission (granted to `super_admin` by
        migration `000006`). Idempotent. An admin cannot suspend themselves.
      operationId: suspendUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target user UUID.
      responses:
        "200":
          description: User suspended (echoes the post-suspend profile)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuspendUserResponse" }
        "400":
          description: Malformed user id OR actor equals target (self-suspend)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Bearer's user lacks the `iam.users/suspend/global` permission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Target user not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Public catalog read (BL-GTW-002 / S1-E-10) ─────────────────────────
  # Gateway REST → catalog-svc gRPC via catalog_grpc_adapter. Catalog-svc's
  # own REST port was retired in G7 (BL-REFACTOR-001); these gateway routes
  # are now the sole client-facing surface. Operators probe catalog health
  # via grpc_health_probe (see monitoring setup per BL-MON-001), not via a
  # gateway proxy.
  /v1/packages:
    get:
      tags: [Catalog]
      summary: List active packages
      operationId: listPackages
      security: []
      parameters:
        - name: kind
          in: query
          required: false
          schema: { $ref: "#/components/schemas/PackageKind" }
        - name: airline_code
          in: query
          required: false
          schema: { type: string }
        - name: hotel_id
          in: query
          required: false
          schema: { type: string }
        - name: departure_from
          in: query
          required: false
          schema: { type: string, format: date }
        - name: departure_to
          in: query
          required: false
          schema: { type: string, format: date }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListPackagesResponse" }
        "400":
          description: Bad request (invalid_query_param / invalid_cursor)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "502":
          description: catalog-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/packages/{id}:
    get:
      tags: [Catalog]
      summary: Active package detail
      operationId: getPackageById
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Package ULID, `pkg_`-prefixed.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetPackageResponse" }
        "404":
          description: Package not found or not publicly visible.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "502":
          description: catalog-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  /v1/package-departures/{id}:
    get:
      tags: [Catalog]
      summary: Active package-departure detail
      operationId: getPackageDepartureById
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Departure ULID, `dep_`-prefixed.
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetDepartureResponse" }
        "404":
          description: Departure not found or not publicly visible.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "500":
          description: Internal error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }
        "502":
          description: catalog-svc unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogErrorResponse" }

  # ── Finance permission-gate smoke (BL-IAM-019 / S1-E-14) ───────────────
  # /v1/finance/ping is the BL-IAM-002 permission-gate acceptance route. It
  # proves the edge middleware chain works end-to-end: RequireBearerToken
  # validates the PASETO token via iam-svc; RequirePermission enforces
  # `journal_entry/read/global`; only then does the gateway call finance-svc
  # over gRPC. finance-svc returns a trivial `{message: "ok"}` — the client-
  # visible user_id / branch_id / roles come from the bearer-populated
  # identity locals on the gateway side. There is no REST proxy for
  # finance liveness; container-level liveness is served by
  # grpc.health.v1.Health (consumed by docker-compose healthchecks).

  /v1/finance/ping:
    get:
      tags: [Proxy / finance]
      summary: Permission-gate smoke (bearer + journal_entry/read/global)
      description: |
        Acceptance route for BL-IAM-002. Protected by the edge middleware
        chain RequireBearerToken + RequirePermission("journal_entry",
        "read", "global"). finance-svc is identity-agnostic — the gateway
        handler assembles `user_id` / `branch_id` / `roles` from its own
        auth locals; `message` comes from finance-svc. If finance is
        unreachable the adapter maps the transport error to 502.
      operationId: getFinancePing
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bearer + permission both accepted; finance reachable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FinancePingResponse" }
        "401":
          description: Missing / malformed bearer or iam-svc rejected the token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Bearer valid but user lacks journal_entry/read/global.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: iam-svc or finance-svc unreachable (fail-closed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PASETO
      description: |
        Single-point edge authentication per ADR 0009 / F1-W7. Clients send
        `Authorization: Bearer <access_token>` on any protected route.
        gateway-svc validates the token once against `iam-svc.ValidateToken`
        (gRPC); backends do NOT re-validate. Failure modes: missing/malformed
        → 401 UNAUTHORIZED; iam-svc rejects → 401 UNAUTHORIZED; iam-svc
        unreachable → 502 SERVICE_UNAVAILABLE (fail-closed).

        No route is currently tagged with this scheme — first consumer lands
        with BL-IAM-018 / S1-E-12 when iam auth REST routes move to gateway.

  schemas:
    LiveResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean, example: true }

    ReadyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean, example: true }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                UPPER_SNAKE error code emitted by the central error middleware.
                Matches iam-svc's legacy REST envelope so existing clients /
                e2e bodies are unaffected. Common values: `VALIDATION_ERROR`,
                `UNAUTHORIZED`, `FORBIDDEN`, `NOT_FOUND`, `CONFLICT`,
                `SERVICE_UNAVAILABLE`, `INTERNAL_ERROR`.
              example: UNAUTHORIZED
            message: { type: string, example: invalid credentials }

    # ── Auth / IAM schemas (BL-IAM-018 / S1-E-12) ──────────────────────────
    # Mirror of the retired services/iam-svc/api/rest_oapi/openapi.yaml body
    # shapes 1:1 so existing clients and e2e bodies keep working unchanged.

    UserProfile:
      type: object
      required: [user_id, email, name, status]
      properties:
        user_id:
          type: string
          format: uuid
          description: User UUID.
        email:
          type: string
          format: email
        name:
          type: string
        branch_id:
          type: string
          format: uuid
          description: Home-branch UUID. Empty for branch-less staff (super_admin seed).
        status:
          type: string
          enum: [active, suspended, pending]
          description: Matches iam.users.status enum.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: Plaintext password; bcrypt-compared server-side. Never logged.
        totp_code:
          type: string
          description: |
            Six-digit TOTP code. Accepted but unused in BL-IAM-001 (login-time
            TOTP enforcement lands in S1-E-06). Clients should still send the
            code after enrollment so they don't need to adapt when enforcement
            flips on.

    LoginResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [access_token, refresh_token, access_expires_at, refresh_expires_at, user]
          properties:
            access_token:
              type: string
              description: PASETO-signed access token. Short-lived.
            refresh_token:
              type: string
              description: Opaque refresh token (hex-encoded). Store client-side; only its SHA-256 digest persists server-side.
            access_expires_at: { type: string, format: date-time }
            refresh_expires_at: { type: string, format: date-time }
            user: { $ref: "#/components/schemas/UserProfile" }

    RefreshSessionRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    RefreshSessionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [access_token, refresh_token, access_expires_at, refresh_expires_at]
          properties:
            access_token: { type: string }
            refresh_token: { type: string }
            access_expires_at: { type: string, format: date-time }
            refresh_expires_at: { type: string, format: date-time }

    GetMeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, totp_enrolled, totp_verified]
          properties:
            user: { $ref: "#/components/schemas/UserProfile" }
            totp_enrolled:
              type: boolean
              description: True once the user has called POST /v1/me/2fa/enroll at least once.
            totp_verified:
              type: boolean
              description: True once the user has successfully verified an enrolled secret.

    EnrollTotpResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [secret, otpauth_url]
          properties:
            secret:
              type: string
              description: Plaintext base32 secret. Shown exactly once; discard after display.
            otpauth_url:
              type: string
              description: otpauth:// URL — render as QR code in the UI.

    VerifyTotpRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Six-digit TOTP code from the user's authenticator.

    VerifyTotpResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [verified_at]
          properties:
            verified_at: { type: string, format: date-time }

    SuspendUserResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user]
          properties:
            user: { $ref: "#/components/schemas/UserProfile" }

    # ── Aggregate backend health (BL-IAM-019 / S1-E-14) ───────────────
    # Driven by grpc.health.v1.Health.Check on each backend (BL-MON-001);
    # the gateway holds one gRPC conn per backend and probes them
    # concurrently. `status` mirrors the gRPC enum names so dashboards can
    # branch cleanly. `error` is populated only when the probe itself
    # failed (unreachable / timeout).
    SystemBackendsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [backends]
          properties:
            backends:
              type: array
              items: { $ref: "#/components/schemas/BackendStatus" }

    BackendStatus:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          description: Service name (e.g. `iam-svc`, `finance-svc`). Stable key for the UI grid.
          example: finance-svc
        status:
          type: string
          enum: [SERVING, NOT_SERVING, UNKNOWN]
          description: Mirror of grpc_health_v1.HealthCheckResponse_ServingStatus.
        error:
          type: string
          description: Non-empty when the probe itself failed (e.g. connection refused, DeadlineExceeded). Empty on a successful probe.

    # ── Finance permission-gate smoke (BL-IAM-019 / S1-E-14) ───────────
    # message comes from finance-svc.FinanceService.FinancePing; the other
    # three fields are populated by the gateway handler from its auth
    # locals (set by RequireBearerToken). Backend never sees caller identity.
    FinancePingResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [message, user_id, branch_id, roles]
          properties:
            message:
              type: string
              description: Always `"ok"` on success. Sourced from finance-svc.
              example: ok
            user_id:
              type: string
              format: uuid
              description: Caller user id from the validated bearer.
            branch_id:
              type: string
              format: uuid
              description: Caller branch id from the validated bearer.
            roles:
              type: array
              description: Caller roles from the validated bearer.
              items:
                type: string

    # ── Catalog error envelope (BL-GTW-002 / S1-E-10) ──────────────────
    # Mirror of services/catalog-svc/api/rest_oapi/openapi.yaml
    # ErrorResponse: snake_case code, id-ID message, optional trace_id.
    # Catalog handlers on gateway write this directly (bypassing the
    # default gateway error middleware that emits UPPER_SNAKE codes).
    CatalogErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                snake_case catalog error code (e.g. `package_not_found`,
                `departure_not_found`, `invalid_query_param`,
                `invalid_cursor`, `internal_error`, `service_unavailable`).
              example: package_not_found
            message:
              type: string
              description: Human-readable message in Bahasa Indonesia (Q003).
              example: paket tidak ditemukan
            trace_id:
              type: string
              description: OTel span ID (hex) for correlation with Tempo.

    # ── Catalog: money / enum helpers ──────────────────────────────────
    Money:
      type: object
      required: [list_amount, list_currency, settlement_currency]
      properties:
        list_amount:
          type: integer
          format: int64
          example: 38500000
        list_currency:
          type: string
          example: IDR
        settlement_currency:
          type: string
          enum: [IDR]
          example: IDR

    PackageKind:
      type: string
      enum: [umrah_reguler, umrah_plus, hajj_furoda, hajj_khusus, badal, financial, retail]

    RoomType:
      type: string
      enum: [double, triple, quad]

    DepartureStatus:
      type: string
      enum: [open, closed]

    OperatorKind:
      type: string
      enum: [airline, rail, bus]

    VendorReadinessState:
      type: string
      enum: [not_started, in_progress, ready, blocked]

    # ── Catalog: master-data refs ──────────────────────────────────────
    HotelRef:
      type: object
      required: [id, name, city, star_rating, walking_distance_m]
      properties:
        id: { type: string }
        name: { type: string }
        city: { type: string }
        star_rating: { type: integer, minimum: 0, maximum: 5 }
        walking_distance_m: { type: integer, minimum: 0 }

    AirlineRef:
      type: object
      required: [id, code, name, operator_kind]
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        operator_kind: { $ref: "#/components/schemas/OperatorKind" }

    MuthawwifRef:
      type: object
      required: [id, name, portrait_url]
      properties:
        id: { type: string }
        name: { type: string }
        portrait_url: { type: string }

    AddonRef:
      type: object
      required: [id, name, list_amount, list_currency, settlement_currency]
      properties:
        id: { type: string }
        name: { type: string }
        list_amount: { type: integer, format: int64 }
        list_currency: { type: string, example: IDR }
        settlement_currency: { type: string, enum: [IDR], example: IDR }

    ItineraryDay:
      type: object
      required: [day, title, description]
      properties:
        day: { type: integer, minimum: 1 }
        title: { type: string }
        description: { type: string }
        photo_url: { type: string }

    Itinerary:
      type: object
      required: [id, days, public_url]
      properties:
        id: { type: string }
        days:
          type: array
          items: { $ref: "#/components/schemas/ItineraryDay" }
        public_url: { type: string }

    # ── Catalog: departure-detail shapes ───────────────────────────────
    PackagePricing:
      type: object
      required: [room_type, list_amount, list_currency, settlement_currency]
      properties:
        room_type: { $ref: "#/components/schemas/RoomType" }
        list_amount: { type: integer, format: int64 }
        list_currency: { type: string, example: IDR }
        settlement_currency: { type: string, enum: [IDR], example: IDR }

    VendorReadiness:
      type: object
      required: [ticket, hotel, visa]
      properties:
        ticket: { $ref: "#/components/schemas/VendorReadinessState" }
        hotel: { $ref: "#/components/schemas/VendorReadinessState" }
        visa: { $ref: "#/components/schemas/VendorReadinessState" }

    DepartureDetail:
      type: object
      required:
        - id
        - package_id
        - departure_date
        - return_date
        - total_seats
        - remaining_seats
        - status
        - pricing
        - vendor_readiness
      properties:
        id: { type: string }
        package_id: { type: string }
        departure_date: { type: string, format: date }
        return_date: { type: string, format: date }
        total_seats: { type: integer, minimum: 0 }
        remaining_seats: { type: integer, minimum: 0 }
        status: { $ref: "#/components/schemas/DepartureStatus" }
        pricing:
          type: array
          items: { $ref: "#/components/schemas/PackagePricing" }
        vendor_readiness: { $ref: "#/components/schemas/VendorReadiness" }

    GetDepartureResponse:
      type: object
      required: [departure]
      properties:
        departure: { $ref: "#/components/schemas/DepartureDetail" }

    # ── Catalog: package-specific ──────────────────────────────────────
    NextDeparture:
      type: object
      required: [id, departure_date, return_date, remaining_seats]
      properties:
        id: { type: string }
        departure_date: { type: string, format: date }
        return_date: { type: string, format: date }
        remaining_seats: { type: integer, minimum: 0 }

    DepartureSummary:
      type: object
      required: [id, departure_date, return_date, remaining_seats, status]
      properties:
        id: { type: string }
        departure_date: { type: string, format: date }
        return_date: { type: string, format: date }
        remaining_seats: { type: integer, minimum: 0 }
        status: { $ref: "#/components/schemas/DepartureStatus" }

    PackageListItem:
      type: object
      required: [id, kind, name, description, cover_photo_url, starting_price]
      properties:
        id: { type: string }
        kind: { $ref: "#/components/schemas/PackageKind" }
        name: { type: string }
        description: { type: string }
        cover_photo_url: { type: string }
        starting_price: { $ref: "#/components/schemas/Money" }
        next_departure:
          allOf:
            - $ref: "#/components/schemas/NextDeparture"
          nullable: true

    PackageDetail:
      type: object
      required:
        - id
        - kind
        - name
        - description
        - highlights
        - cover_photo_url
        - hotels
        - add_ons
        - departures
      properties:
        id: { type: string }
        kind: { $ref: "#/components/schemas/PackageKind" }
        name: { type: string }
        description: { type: string }
        highlights:
          type: array
          items: { type: string }
        cover_photo_url: { type: string }
        itinerary:
          allOf:
            - $ref: "#/components/schemas/Itinerary"
          nullable: true
        hotels:
          type: array
          items: { $ref: "#/components/schemas/HotelRef" }
        airline:
          allOf:
            - $ref: "#/components/schemas/AirlineRef"
          nullable: true
        muthawwif:
          allOf:
            - $ref: "#/components/schemas/MuthawwifRef"
          nullable: true
        add_ons:
          type: array
          items: { $ref: "#/components/schemas/AddonRef" }
        departures:
          type: array
          items: { $ref: "#/components/schemas/DepartureSummary" }

    PageMeta:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: string
          nullable: true
        has_more: { type: boolean }

    ListPackagesResponse:
      type: object
      required: [packages, page]
      properties:
        packages:
          type: array
          items: { $ref: "#/components/schemas/PackageListItem" }
        page: { $ref: "#/components/schemas/PageMeta" }

    GetPackageResponse:
      type: object
      required: [package]
      properties:
        package: { $ref: "#/components/schemas/PackageDetail" }
