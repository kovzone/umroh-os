components:
  schemas:
    LiveResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean, example: true }

    ReadyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean, example: true }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:    { type: string, example: BAD_GATEWAY }
            message: { type: string, example: upstream service unavailable }
