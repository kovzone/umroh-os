syntax = "proto3";

package pb;

option go_package="./pb";

// Consumer-side mirror of iam-svc/api/grpc_api/pb/iam.proto — carries only the
// RPCs catalog-svc actually calls (ValidateToken + CheckPermission + RecordAudit).
// Kept in sync by hand as the contract evolves; any change must be reflected here
// AND in the producer proto, with a § Changelog entry in docs/contracts/slice-S1.md
// if the wire shape changes.
//
// Per add-grpc-method hard rule: consumer services must NOT import the
// producer's pb package directly — each service keeps its own generated stub.

service IamService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse) {}
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse) {}
  rpc RecordAudit(RecordAuditRequest) returns (RecordAuditResponse) {}
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  string branch_id = 2;
  string session_id = 3;
  repeated string roles = 4;
  int64 expires_at_unix = 5;
}

message CheckPermissionRequest {
  string user_id = 1;
  string resource = 2;
  string action = 3;
  string scope = 4;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message RecordAuditRequest {
  string user_id = 1;
  string branch_id = 2;
  string resource = 3;
  string resource_id = 4;
  string action = 5;
  bytes old_value = 6;
  bytes new_value = 7;
  string ip = 8;
}

message RecordAuditResponse {
  string audit_log_id = 1;
  int64 created_at_unix = 2;
}
