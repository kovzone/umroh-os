openapi: 3.0.3
info:
  title: iam-svc API
  version: 0.2.0
  description: |
    Identity, Access, and Audit endpoints for UmrohOS.

    Current scope (S1-E-04 / BL-IAM-001):
      - System probes: `/system/live`, `/system/ready`, `/system/diagnostics/db-tx`
      - Sessions: `POST /v1/sessions` (login), `POST /v1/sessions/refresh`, `DELETE /v1/sessions`
      - Current user: `GET /v1/me`
      - TOTP self-enrollment: `POST /v1/me/2fa/enroll`, `POST /v1/me/2fa/verify`

    Bearer-token authentication is enforced by middleware on every `/v1/me*` route
    and on `DELETE /v1/sessions` (see `api/rest_oapi/middleware/bearer_auth.go`).
    The middleware is not reflected in this spec because oapi-codegen + Fiber
    do not round-trip the OpenAPI `securityScheme` type the way we'd want for
    extraction into a request-context `*token.Payload`. A 401 response with
    `ErrorResponse` is documented per operation instead.

    Deferred (sibling S1-E-04 cards + S1-E-06 depth card):
      - gRPC ValidateToken / CheckPermission (BL-IAM-002)
      - Admin suspend / revoke-all (BL-IAM-003)
      - Audit log write path (BL-IAM-004)
      - User / role / branch / audit-log admin CRUD (S1-E-06)

servers:
  - url: /
    description: Base path (prefixed by gateway as needed)

paths:
  # ── System ────────────────────────────────────────────────────────────
  /system/live:
    get:
      tags:
        - System
      summary: Liveness probe
      description: Verifies the process is alive. No external dependencies. Returns 200 with ok true.
      operationId: liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveResponse"

  /system/ready:
    get:
      tags:
        - System
      summary: Readiness probe
      description: Verifies the instance can handle traffic (e.g. DB connectivity). Read-only; no mutation.
      operationId: readiness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /system/diagnostics/db-tx:
    get:
      tags:
        - System
      summary: DB transaction diagnostic
      description: |
        State-mutating diagnostic to validate the WithTx pattern against the
        shared `public.diagnostics` table (every service writes here, stamped
        with its app name). Inserts a row, reads it back inside the same
        transaction, and returns the inserted ID.

        Pilot-scope endpoint; not for health/readiness probes. Exposed without
        authentication for the pilot — gate (config flag, header secret, or
        admin role) before promoting past pilot.
      operationId: dbTxDiagnostic
      parameters:
        - name: message
          in: query
          required: false
          schema:
            type: string
            default: "no message"
          description: Message to store and echo back.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbTxDiagnosticResponse"

  # ── Sessions (login / refresh / logout) ───────────────────────────────
  /v1/sessions:
    post:
      tags:
        - Sessions
      summary: Login — exchange credentials for an access + refresh token pair
      description: |
        Authenticates a staff user by email + password and returns a PASETO
        access token plus an opaque refresh token. Public endpoint (no bearer).

        TOTP enforcement at login is deferred to `S1-E-06` (BL-IAM-005..017);
        `totp_code` is accepted but ignored in BL-IAM-001.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account suspended or pending activation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Sessions
      summary: Logout — revoke the current session row
      description: |
        Revokes the refresh-token row identified by the session-id claim
        baked into the bearer access token. Idempotent — a second call on an
        already-revoked session succeeds silently. The access token itself
        remains valid until its short TTL elapses; this endpoint invalidates
        further refreshes.

        Requires a valid `Authorization: Bearer <access_token>` header
        (enforced by middleware; not a spec-level security scheme).
      operationId: logout
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sessions/refresh:
    post:
      tags:
        - Sessions
      summary: Rotate refresh token — issue a new access + refresh pair
      description: |
        Validates the supplied refresh token, rotates it (revokes the old row,
        creates a new row) and returns a new access + refresh pair. Refresh-token
        replay (presenting a token already seen as revoked) triggers revocation
        of every active session for the user. Public endpoint; no bearer required.
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshSessionRequest"
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshSessionResponse"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Refresh token unknown, expired, or revoked (replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: User no longer active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Current user (/v1/me*) ────────────────────────────────────────────
  /v1/me:
    get:
      tags:
        - Me
      summary: Current user profile
      description: |
        Returns the user profile resolved from the bearer access token.
        Requires a valid `Authorization: Bearer <access_token>` header.
      operationId: getMe
      responses:
        "200":
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found (soft-deleted after token issuance)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/me/2fa/enroll:
    post:
      tags:
        - Me
      summary: Begin TOTP enrollment — generate a new secret + otpauth URL
      description: |
        Generates a fresh TOTP secret, persists it encrypted at rest on the
        current user's row, and returns the plaintext base32 secret plus the
        `otpauth://` URL the client can render as a QR code. The secret is
        returned exactly once — the client should show it immediately and
        then discard it from memory.

        Rejects the call with 409 if the user already has a verified TOTP.
        Admin-assisted reset (device lost) is deferred to `S1-E-06`.

        Requires a valid `Authorization: Bearer <access_token>` header.
      operationId: enrollTOTP
      responses:
        "200":
          description: Enrollment started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollTOTPResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: TOTP already verified for this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/me/2fa/verify:
    post:
      tags:
        - Me
      summary: Verify TOTP code and mark enrollment complete
      description: |
        Accepts a six-digit code from the user's authenticator app and,
        on success, stamps `users.totp_verified_at` with now().

        Requires a valid `Authorization: Bearer <access_token>` header.
      operationId: verifyTOTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTOTPRequest"
      responses:
        "200":
          description: Verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyTOTPResponse"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid TOTP code or missing/invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: TOTP not yet enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    # ── System schemas ────────────────────────────────────────────────
    LiveResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - ok
          properties:
            ok:
              type: boolean
              example: true

    ReadyResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - ok
          properties:
            ok:
              type: boolean
              example: true

    DbTxDiagnosticResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - diagnostic_id
            - message
          properties:
            diagnostic_id:
              type: integer
              format: int64
              description: ID of the inserted diagnostic row.
            message:
              type: string
              description: Echo of the message received from the client.

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: UNAUTHORIZED
            message:
              type: string
              example: invalid credentials

    # ── Shared IAM schemas ────────────────────────────────────────────
    UserProfile:
      type: object
      required:
        - user_id
        - email
        - name
        - status
      properties:
        user_id:
          type: string
          format: uuid
          description: User UUID.
        email:
          type: string
          format: email
        name:
          type: string
        branch_id:
          type: string
          format: uuid
          description: Home-branch UUID. Empty for branch-less staff (super_admin seed).
        status:
          type: string
          enum:
            - active
            - suspended
            - pending
          description: Matches iam.users.status enum.

    # ── Session schemas ───────────────────────────────────────────────
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: Plaintext password; bcrypt-compared server-side. Never logged.
        totp_code:
          type: string
          description: |
            Six-digit TOTP code. Accepted but unused in BL-IAM-001 (login-time TOTP
            enforcement lands in S1-E-06). Clients should still send the code after
            the user has verified their TOTP enrollment so they do not need to
            adapt when the enforcement flips on.

    LoginResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - access_token
            - refresh_token
            - access_expires_at
            - refresh_expires_at
            - user
          properties:
            access_token:
              type: string
              description: PASETO-signed access token. Short-lived (see config.token.access_duration).
            refresh_token:
              type: string
              description: Opaque refresh token (hex-encoded random bytes). Store on the client only; only its SHA-256 digest is persisted server-side.
            access_expires_at:
              type: string
              format: date-time
            refresh_expires_at:
              type: string
              format: date-time
            user:
              $ref: "#/components/schemas/UserProfile"

    RefreshSessionRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    RefreshSessionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - access_token
            - refresh_token
            - access_expires_at
            - refresh_expires_at
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            access_expires_at:
              type: string
              format: date-time
            refresh_expires_at:
              type: string
              format: date-time

    # ── Me schemas ────────────────────────────────────────────────────
    GetMeResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - user
            - totp_enrolled
            - totp_verified
          properties:
            user:
              $ref: "#/components/schemas/UserProfile"
            totp_enrolled:
              type: boolean
              description: True once the user has called POST /v1/me/2fa/enroll at least once.
            totp_verified:
              type: boolean
              description: True once the user has successfully verified an enrolled secret.

    EnrollTOTPResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - secret
            - otpauth_url
          properties:
            secret:
              type: string
              description: Plaintext base32 secret. Shown exactly once; discard after display.
            otpauth_url:
              type: string
              description: otpauth:// URL — render as QR code in the UI.

    VerifyTOTPRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: Six-digit TOTP code from the user's authenticator app.

    VerifyTOTPResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - verified_at
          properties:
            verified_at:
              type: string
              format: date-time
