syntax = "proto3";

package pb;

option go_package="./pb";

// IamService — internal gRPC surface for Identity, Access, Audit.
//
// BL-IAM-002 landed the two hot-path RPCs that every downstream service calls:
//   - ValidateToken   — verify a bearer + return identity claims + role names
//   - CheckPermission — resolve (resource, action, scope) via user_roles × role_permissions × permissions
//
// BL-IAM-004 adds the audit-producer surface so state-changing calls in every
// service record one append-only row in iam.audit_logs:
//   - RecordAudit — insert one row into iam.audit_logs for a state-changing action
//
// GetUser remains planned (S1-E-06) — not part of this contract yet.
service IamService {
  // Healthz returns ok=true if the service process is alive.
  // Placeholder for the pilot; real health checks go through gRPC health protocol.
  rpc Healthz(HealthzRequest) returns (HealthzResponse) {}

  // ValidateToken verifies a bearer access token and returns identity + current role names.
  //
  // Fails with Unauthenticated when the token is missing, malformed, expired, or the
  // backing session row is revoked / missing. Callers (consumer-side bearer middleware)
  // treat any error as fail-closed 401 per F1 acceptance.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse) {}

  // CheckPermission resolves whether the user currently holds (resource, action, scope).
  //
  // Returns allowed=true when any of the user's roles grants the exact tuple.
  // Returns allowed=false (ok gRPC status) when the tuple is not granted — consumers
  // translate that to HTTP 403. Invalid scope or missing user_id yields InvalidArgument.
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse) {}

  // RecordAudit inserts one row into iam.audit_logs for a state-changing action.
  //
  // The row is append-only at the DB layer (UPDATE/DELETE raise insufficient_privilege
  // via trigger). Call this synchronously from the caller's business transaction where
  // strict business-success ↔ audit-success atomicity is required. Callers that prefer
  // best-effort emission wrap the RPC in a goroutine on their side — the wire contract
  // itself is synchronous and atomic-per-call.
  //
  // Returns InvalidArgument when resource / action are empty, or when user_id /
  // branch_id are set but not valid UUIDs.
  rpc RecordAudit(RecordAuditRequest) returns (RecordAuditResponse) {}
}

message HealthzRequest {}

message HealthzResponse {
  bool ok = 1;
}

message ValidateTokenRequest {
  // Raw bearer access token (the string after `Bearer `).
  string access_token = 1;
}

message ValidateTokenResponse {
  // UUID string of the authenticated user (iam.users.id).
  string user_id = 1;
  // UUID string of the user's branch (iam.users.branch_id).
  string branch_id = 2;
  // UUID string of the session row backing this token (iam.sessions.id).
  string session_id = 3;
  // Role names currently assigned to the user (snapshot at validation time).
  repeated string roles = 4;
  // Token expiry as Unix seconds UTC.
  int64 expires_at_unix = 5;
}

message CheckPermissionRequest {
  // UUID string of the user to evaluate.
  string user_id = 1;
  // Resource key (e.g. "journal_entry", "booking").
  string resource = 2;
  // Action key (e.g. "read", "write", "create_on_behalf").
  string action = 3;
  // Scope — one of "global" | "branch" | "personal" (matches iam.permission_scope).
  string scope = 4;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message RecordAuditRequest {
  // UUID string of the actor (iam.users.id). Empty string means "system-initiated"
  // (no foreign key — the audit_logs.user_id column is nullable). Non-empty values
  // must parse as UUIDs or the call fails InvalidArgument.
  string user_id = 1;

  // UUID string of the actor's branch (iam.users.branch_id), optional. Empty means
  // "no branch scope" (column is nullable). Non-empty values must parse as UUIDs.
  string branch_id = 2;

  // Resource key — e.g. "user", "booking", "package", "journal_entry". Required.
  string resource = 3;

  // Resource identifier — typically a UUID string, but the column is TEXT so any
  // opaque id is acceptable. Empty string permitted (the column default is '').
  string resource_id = 4;

  // Action key — e.g. "create", "update", "suspend", "approve". Required.
  string action = 5;

  // JSONB-encoded pre-change state of the resource. Empty bytes → NULL in storage.
  // Callers marshal their own JSON; the server does not interpret the contents.
  bytes old_value = 6;

  // JSONB-encoded post-change state of the resource. Empty bytes → NULL in storage.
  bytes new_value = 7;

  // Actor IP as an IP literal (e.g. "203.0.113.5"). Empty string → NULL in storage.
  // Non-empty values must be valid IPs (IPv4 or IPv6) or the call fails InvalidArgument.
  string ip = 8;
}

message RecordAuditResponse {
  // UUID string of the newly-inserted iam.audit_logs.id.
  string audit_log_id = 1;

  // Insertion timestamp as Unix seconds UTC (matches ValidateToken convention).
  int64 created_at_unix = 2;
}
