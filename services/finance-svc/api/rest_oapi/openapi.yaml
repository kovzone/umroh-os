openapi: 3.0.3
info:
  title: finance-svc API
  version: 0.2.0
  description: |
    finance-svc REST surface.

    Scaffold exposes the three standard diagnostic endpoints under `/system/*`
    plus the BL-IAM-002 placeholder `GET /v1/finance/ping` — the minimal
    authenticated route that exercises the iam-svc permission gate ("finance
    routes denied for non-finance roles"). Real finance endpoints (journals,
    AR/AP, reports) land with S3-E-03 + S3-E-07.

    Authenticated routes require `Authorization: Bearer <token>`; the token is
    verified against `iam.v1.IamService/ValidateToken` and the caller's
    permissions via `iam.v1.IamService/CheckPermission`. The bearer enforcement
    is middleware-level, not a schema concern — keep `security:` empty at the
    path level and let `cmd/server.go` mount the middleware on protected groups.

servers:
  - url: /
    description: Base path (prefixed by gateway as needed)

paths:
  /system/live:
    get:
      tags:
        - System
      summary: Liveness probe
      description: Verifies the process is alive. No external dependencies. Returns 200 with ok true.
      operationId: liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveResponse"

  /system/ready:
    get:
      tags:
        - System
      summary: Readiness probe
      description: Verifies the instance can handle traffic (e.g. DB connectivity). Read-only; no mutation.
      operationId: readiness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /v1/finance/ping:
    get:
      tags:
        - Finance
      summary: Authenticated finance ping (BL-IAM-002 placeholder)
      description: |
        Proves the iam-svc → finance-svc permission gate end-to-end.

        Requires `Authorization: Bearer <token>`. The bearer is validated via
        `iam-svc.ValidateToken` and the tuple `journal_entry/read/global` is
        resolved via `iam-svc.CheckPermission`. Callers holding the permission
        receive a 200 with their own identity echoed back; callers without it
        receive a 403. Missing / invalid bearer is 401.

        This route is the scaffold for every future finance endpoint's base
        gate — real endpoints (journals, AR/AP, reports) land with S3-E-03 +
        S3-E-07 and may substitute narrower permission tuples.
      operationId: financePing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancePingResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /system/diagnostics/db-tx:
    get:
      tags:
        - System
      summary: DB transaction diagnostic
      description: |
        State-mutating diagnostic to validate the WithTx pattern against the
        shared `public.diagnostics` table (every service writes here, stamped
        with its app name). Inserts a row, reads it back inside the same
        transaction, and returns the inserted ID.

        Pilot-scope endpoint; not for health/readiness probes. Exposed without
        authentication for the pilot — gate (config flag, header secret, or
        admin role) before promoting past pilot.
      operationId: dbTxDiagnostic
      parameters:
        - name: message
          in: query
          required: false
          schema:
            type: string
            default: "no message"
          description: Message to store and echo back.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbTxDiagnosticResponse"

components:
  schemas:
    LiveResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - ok
          properties:
            ok:
              type: boolean
              example: true

    ReadyResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - ok
          properties:
            ok:
              type: boolean
              example: true

    FinancePingResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - message
            - user_id
            - roles
          properties:
            message:
              type: string
              example: ok
            user_id:
              type: string
              format: uuid
              description: Authenticated user's UUID (from the bearer token's session).
            roles:
              type: array
              items:
                type: string
              description: Role names currently granted to the user (snapshot at validation time).

    DbTxDiagnosticResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - diagnostic_id
            - message
          properties:
            diagnostic_id:
              type: integer
              format: int64
              description: ID of the inserted diagnostic row.
            message:
              type: string
              description: Echo of the message received from the client.

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: INTERNAL_ERROR
            message:
              type: string
              example: Internal server error
